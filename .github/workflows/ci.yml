name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e apps/local-web/backend[dev]
      - name: Test backend
        run: pytest apps/local-web/backend/tests -q

  rag-core:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install plugin test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/local-web/plugins/rag-core/runtime/requirements.txt pytest
      - name: Test rag-core
        env:
          PYTHONPATH: apps/local-web/plugins/rag-core
        run: pytest apps/local-web/plugins/rag-core/tests apps/local-web/plugins/rag-core/runtime/tests -q

  frontend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/local-web/frontend/package-lock.json
      - name: Install frontend
        working-directory: apps/local-web/frontend
        run: npm ci
      - name: Test frontend
        working-directory: apps/local-web/frontend
        run: npm test
      - name: Build frontend
        working-directory: apps/local-web/frontend
        run: npm run build

  desktop-scripts:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/local-web/desktop/package-lock.json
      - name: Install desktop scripts
        working-directory: apps/local-web/desktop
        run: npm ci
      - name: Test desktop scripts
        working-directory: apps/local-web/desktop
        run: |
          npm run test:doctor
          npm run test:prepare-release
          npm run test:release-local
          npm run test:portable
          npm run test:run-tauri
